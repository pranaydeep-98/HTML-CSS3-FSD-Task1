    <style>
                .header-content {
            display: flex;
            background-color: orange;
            color: black;
            padding: 0;
            text-align: center;
            align-items: center;
            
        }   
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:350px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#ff9800;
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
        }

        input[type="text"],
        input[type="password"]{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        input:focus{
            outline:none;
            border-color:#ff9800;
        }

        button{
            width:100%;
            padding:12px;
            background:#ff9800;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#e68900;
        }

        .links{
            text-align:center;
            margin-top:15px;
        }

        .links a{
            text-decoration:none;
            color:#ff9800;
            font-weight:bold;
        }

        .links a:hover{
            text-decoration:underline;
        }
    </style>

    <div class="container">

        <h1>Login</h1>

        <form action="dashboard.html" method="post">

            <label for="user">Email or Mobile Number</label>
            <input type="text" id="user" name="user" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Login</button>

        </form>
